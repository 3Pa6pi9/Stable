<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Dashboard - {{ app_name }}</title>
   <style>
       * { box-sizing: border-box; }
       body {
           margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
           background: linear-gradient(135deg, #fd297b 0%, #ff655b 100%);
           min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
       }
       .dashboard-card {
           background: #fff; border-radius: 15px; padding: 50px 40px;
           width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
       }
       .logo { font-size: 50px; font-weight: 800; color: #fd297b; margin-bottom: 20px; }
       h2 { color: #333; margin-bottom: 15px; }
       .welcome-message { color: #666; margin-bottom: 30px; font-size: 16px; }
       .logout-btn {
           display: inline-block; background: linear-gradient(135deg, #fd297b 0%, #ff655b 100%);
           color: white; text-decoration: none; padding: 12px 30px; border-radius: 30px;
           font-weight: 600; transition: transform 0.2s ease;
       }
       .logout-btn:hover { transform: scale(1.02); }
   </style>
</head>
<body>
<div class="dashboard-card">
   <div class="logo">{{ app_name }}</div>
   <h2>Welcome back!</h2>
   <div class="welcome-message">You are logged in as <strong>{{ username }}</strong>.</div>
   <p style="color: #888; margin-bottom: 30px;">This is your standard dashboard. You don't have administrative privileges.</p>
   <a href="/logout" class="logout-btn">Log Out</a>
</div>
</body>
</html>
